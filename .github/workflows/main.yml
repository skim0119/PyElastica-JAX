name: CI

on: [push, pull_request]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        # Run macos tests if really required, since they charge 10 times more for macos
        os: [ubuntu-latest] #, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      # Ref: https://docs.github.com/en/free-pro-team@latest/actions/guides/building-and-testing-python
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Display Python version
        run: python -c "import sys; print(sys.version)"
      - name: Install dependencies
        run: |
          make install-dev-deps PYTHON_VERSION=${{ matrix.python-version }}
          uv cache prune --ci
      - name: Run style checks
        if: always()
        run: make check-codestyle
      - name: Run tests
        if: always()
        run: make test
      - name: Typechecking
        if: always()
        run: make mypy
